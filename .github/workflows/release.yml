name: Release

# Fires whenever a tag is pushed, e.g. `git tag v1.2.0 && git push origin v1.2.0`.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub Release and upload assets

env:
  FLUTTER_VERSION: "3.44.2"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # Release build uses the debug signing config from android/app/build.gradle.kts.
      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv build/app/outputs/flutter-apk/app-release.apk "luminotes-${VERSION}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: luminotes-*.apk
          if-no-files-found: error

  build-linux:
    name: Build Linux (rpm + tarball)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            rpm ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Linux bundle
        run: flutter build linux --release

      - name: Package tarball and rpm
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE="build/linux/x64/release/bundle"

          # Portable executable tarball (run ./luminotes from the extracted folder).
          tar -czf "luminotes-${VERSION}-linux-x64.tar.gz" -C "$BUNDLE" .

          # .desktop entry installed alongside the rpm.
          cat > luminotes.desktop <<'EOF'
          [Desktop Entry]
          Name=Luminotes
          Exec=/opt/luminotes/luminotes
          Icon=luminotes
          Type=Application
          Categories=Office;Utility;
          Terminal=false
          EOF

          # Create /usr/bin symlink after install so the binary is on PATH.
          cat > after-install.sh <<'EOF'
          #!/bin/sh
          ln -sf /opt/luminotes/luminotes /usr/bin/luminotes
          EOF
          cat > after-remove.sh <<'EOF'
          #!/bin/sh
          rm -f /usr/bin/luminotes
          EOF

          fpm -s dir -t rpm \
            -n luminotes \
            -v "${VERSION}" \
            -a x86_64 \
            --license "Proprietary" \
            --description "Luminotes" \
            --rpm-summary "Luminotes notes app" \
            --after-install after-install.sh \
            --after-remove after-remove.sh \
            "${BUNDLE}/=/opt/luminotes" \
            "luminotes.desktop=/usr/share/applications/luminotes.desktop"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            luminotes-*-linux-x64.tar.gz
            *.rpm
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-android, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can diff against the previous tag

      - name: Generate changelog
        id: changelog
        run: |
          set -euo pipefail
          PREV="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [ -n "$PREV" ]; then
            echo "Changes since ${PREV}:"
            RANGE="${PREV}..${GITHUB_REF_NAME}"
          else
            echo "Initial release."
            RANGE="${GITHUB_REF_NAME}"
          fi
          {
            echo "## Changes"
            echo
            if [ -n "$PREV" ]; then
              echo "Commits since [\`${PREV}\`](../../releases/tag/${PREV}):"
            else
              echo "First release."
            fi
            echo
            git log "$RANGE" --no-merges --pretty=format:"- %s (%h)"
          } > CHANGELOG.md
          cat CHANGELOG.md

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            dist/luminotes-*.apk
            dist/luminotes-*-linux-x64.tar.gz
            dist/*.rpm
