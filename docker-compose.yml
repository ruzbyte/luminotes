# Self-hosted Luminotes sync server.
#
#   cp .env.example .env && edit .env
#   docker compose up -d
#   docker compose exec server luminotes-server user add <name>
#
# Caddy terminates TLS and reverse-proxies to the server. Point DOMAIN's DNS at
# this host and Caddy obtains/renews a Let's Encrypt certificate automatically.

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      DATA_DIR: /data
      ADMIN_USER: ${ADMIN_USER:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - data:/data
    expose:
      - "8080"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  data:
  caddy_data:
  caddy_config:
